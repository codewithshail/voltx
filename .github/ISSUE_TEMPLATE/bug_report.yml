name: Bug Report
description: Report a bug in VoltX
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: input
    id: package
    attributes:
      label: Which package?
      description: e.g., @voltx/server, @voltx/ai, @voltx/agents
      placeholder: "@voltx/server"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide a minimal code snippet or steps to reproduce the issue.
      placeholder: |
        1. Run `npx create-voltx-app my-app`
        2. Add this code to `api/test.ts`...
        3. Run `npm run dev` and visit `/api/test`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Copy the output of `npx envinfo --system --npmPackages @voltx/* --binaries`
      render: shell
